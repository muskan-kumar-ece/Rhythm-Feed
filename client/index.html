<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <meta property="og:title" content="Rytham" />
    <meta property="og:description" content="Discover music through an infinite, mood-driven vertical feed. Your AI DJ, always on." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://replit.com/public/images/opengraph.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@replit" />
    <meta name="twitter:title" content="Rytham" />
    <meta name="twitter:description" content="Discover music through an infinite, mood-driven vertical feed. Your AI DJ, always on." />
    <meta name="twitter:image" content="https://replit.com/public/images/opengraph.png" />

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
      /* ─── Equalizer (reused for waveform) ───────────────────── */
      @keyframes equalizer {
        0%   { height: 10%; }
        100% { height: 100%; }
      }

      /* ─── Logo text shimmer ─────────────────────────────────── */
      @keyframes logo-shimmer {
        0%, 100% { background-position: 0%   50%; }
        50%       { background-position: 100% 50%; }
      }

      /* ─── Page enter ────────────────────────────────────────── */
      @keyframes page-enter {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0);    }
      }

      /* ─── Like button spring pop ────────────────────────────── */
      @keyframes like-pop {
        0%   { transform: scale(1)    rotate(0deg);   }
        20%  { transform: scale(1.55) rotate(-12deg); }
        45%  { transform: scale(0.82) rotate(6deg);   }
        70%  { transform: scale(1.22) rotate(-4deg);  }
        85%  { transform: scale(0.95) rotate(2deg);   }
        100% { transform: scale(1)    rotate(0deg);   }
      }

      /* ─── Bookmark stamp ────────────────────────────────────── */
      @keyframes save-stamp {
        0%   { transform: scale(1)    rotate(0deg);  }
        18%  { transform: scale(0.6)  rotate(10deg); }
        50%  { transform: scale(1.35) rotate(-6deg); }
        75%  { transform: scale(0.9)  rotate(3deg);  }
        100% { transform: scale(1)    rotate(0deg);  }
      }

      /* ─── +N counter float ──────────────────────────────────── */
      @keyframes float-counter {
        0%   { opacity: 1; transform: translateY(0)     scale(1);   }
        35%  { opacity: 1; transform: translateY(-18px) scale(1.1); }
        100% { opacity: 0; transform: translateY(-48px) scale(0.7); }
      }

      /* ─── Particle burst (CSS vars --tx/--ty) ───────────────── */
      @keyframes particle-burst {
        0%   { opacity: 1; transform: translate(0, 0)                          scale(1);   }
        50%  { opacity: 0.9; transform: translate(calc(var(--tx)*.6), calc(var(--ty)*.6)) scale(0.7); }
        100% { opacity: 0;  transform: translate(var(--tx), var(--ty))         scale(0);   }
      }

      /* ─── Ripple tap ────────────────────────────────────────── */
      @keyframes ripple-out {
        0%   { transform: scale(0.2); opacity: 0.6; }
        100% { transform: scale(3.5); opacity: 0;   }
      }

      /* ─── Nav icon bounce ───────────────────────────────────── */
      @keyframes nav-bounce {
        0%   { transform: scale(1)    translateY(0);   }
        25%  { transform: scale(0.72) translateY(3px); }
        55%  { transform: scale(1.25) translateY(-5px);}
        75%  { transform: scale(0.92) translateY(1px); }
        100% { transform: scale(1)    translateY(0);   }
      }

      /* ─── Glow ring expand ──────────────────────────────────── */
      @keyframes glow-ring {
        0%   { transform: scale(0.5); opacity: 0.9; }
        100% { transform: scale(2.4); opacity: 0;   }
      }

      /* ─── Follow flash ──────────────────────────────────────── */
      @keyframes follow-flash {
        0%   { box-shadow: 0 0 0px 0px  rgba(168,85,247,0);   }
        40%  { box-shadow: 0 0 16px 6px rgba(168,85,247,0.6); }
        100% { box-shadow: 0 0 0px 0px  rgba(168,85,247,0);   }
      }

      /* ─── Share pop ─────────────────────────────────────────── */
      @keyframes share-pop {
        0%   { transform: scale(1);                  }
        30%  { transform: scale(1.35) rotate(-15deg);}
        60%  { transform: scale(0.88) rotate(8deg);  }
        80%  { transform: scale(1.1);                }
        100% { transform: scale(1);                  }
      }

      /* ─── Nav active glow pill pulse ────────────────────────── */
      @keyframes nav-glow {
        0%,100% { opacity: 0.5; transform: scaleX(0.8); }
        50%     { opacity: 1;   transform: scaleX(1);   }
      }

      /* ─── Checkmark draw ────────────────────────────────────── */
      @keyframes check-draw {
        0%   { stroke-dashoffset: 60; }
        100% { stroke-dashoffset: 0;  }
      }

      /* ─── Ambient glow pulse ────────────────────────────────── */
      @keyframes ambient-pulse {
        0%,100% { opacity: 0.5; }
        50%     { opacity: 0.8; }
      }

      /* ─── No tap flash ──────────────────────────────────────── */
      * { -webkit-tap-highlight-color: transparent; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
